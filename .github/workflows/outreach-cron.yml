name: Outreach Autopilot

on:
  schedule:
    # Outreach: 9 AM IST (3:30 AM UTC) Mon-Fri
    - cron: '30 3 * * 1-5'
    # Follow-up: 2 PM IST (8:30 AM UTC) Mon-Fri
    - cron: '30 8 * * 1-5'
    # Auto-reply: Every 2 hours during business hours IST (5:30 AM - 3:30 PM UTC) Mon-Fri
    - cron: '30 5,7,9,11,13,15 * * 1-5'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  outreach:
    if: github.event.schedule == '30 3 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send cold outreach emails
        run: |
          result=$(curl -s -X POST "${{ secrets.APP_URL }}/api/cron/outreach" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          echo "Outreach result: $result"

  follow-up:
    if: github.event.schedule == '30 8 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send follow-up emails
        run: |
          result=$(curl -s -X POST "${{ secrets.APP_URL }}/api/cron/follow-up" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          echo "Follow-up result: $result"

  auto-reply:
    if: github.event.schedule == '30 5,7,9,11,13,15 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check inbox and auto-reply
        run: |
          result=$(curl -s -X POST "${{ secrets.APP_URL }}/api/cron/auto-reply" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          echo "Auto-reply result: $result"
